<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mudassir's Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <script>
      // Font aur Tailwind ko Preview window ke andar bhejna
      CMS.registerPreviewStyle("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap");
      CMS.registerPreviewStyle("https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css");

      // Custom React Component for Live Preview (Bento Card Style)
      var ProjectPreview = createClass({
        render: function() {
          var entry = this.props.entry;
          var title = entry.getIn(['data', 'title']) || "Project Title";
          var category = entry.getIn(['data', 'category']) || "Category";
          var description = entry.getIn(['data', 'description']) || "Type your description here...";
          var image = entry.getIn(['data', 'image']);
          var bgImage = this.props.getAsset(image);

          return h('div', {style: {fontFamily: '"Plus Jakarta Sans", sans-serif', padding: '40px', backgroundColor: '#f9fafb', minHeight: '100vh'}},
            h('div', {className: "max-w-xl mx-auto bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100"},
              // Image Area
              h('div', {className: "h-64 bg-purple-50 relative flex items-center justify-center overflow-hidden p-6"},
                bgImage ? h('img', {src: bgImage.toString(), className: "object-contain h-full w-full relative z-10 drop-shadow-xl"}) : h('div', {className: "text-purple-300 font-bold"}, "No Image Uploaded Yet")
              ),
              // Content Area
              h('div', {className: "p-8"},
                h('span', {className: "text-xs font-bold text-purple-600 uppercase tracking-widest bg-purple-100 px-3 py-1 rounded-full"}, category),
                h('h2', {className: "text-3xl font-bold mt-4 mb-3 text-gray-900 leading-tight"}, title),
                h('p', {className: "text-gray-600 leading-relaxed text-sm"}, description)
              )
            )
          );
        }
      });

      // CMS ko batana ke projects collection par yeh design apply karna hai
      CMS.registerPreviewTemplate("projects", ProjectPreview);
    </script>
  </body>
</html>
