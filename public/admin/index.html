<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mudassir's Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <script>
      CMS.registerPreviewStyle("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap");
      CMS.registerPreviewStyle("https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css");

      var ProjectPreview = createClass({
        render: function() {
          var entry = this.props.entry;
          var title = entry.getIn(['data', 'title']) || "Project Title";
          var category = entry.getIn(['data', 'category']) || "Category";
          var description = entry.getIn(['data', 'description']) || "Type your description here...";

          // Bulletproof Tags
          var tagsData = entry.getIn(['data', 'tags']);
          var tagsArray = [];
          if (tagsData) {
              if (typeof tagsData === 'string') {
                  tagsArray = tagsData.split(',').map(t => t.trim());
              } else if (tagsData.toJS) {
                  var jsData = tagsData.toJS();
                  if(Array.isArray(jsData)) {
                      if(jsData.length === 1 && jsData[0].includes(',')) {
                          tagsArray = jsData[0].split(',').map(t => t.trim());
                      } else {
                          tagsArray = jsData;
                      }
                  }
              }
          }

          var tagsElements = tagsArray.filter(Boolean).map(function(tag, index) {
            return h('span', {key: index, className: "px-4 py-1.5 bg-gray-100 text-gray-700 rounded-full text-xs font-bold tracking-wide border border-gray-200"}, tag);
          });

          // Image Check
          var hasImage = !!entry.getIn(['data', 'image']);

          // THE PERFECT BENTO CARD UI
          return h('div', {style: {fontFamily: '"Plus Jakarta Sans", sans-serif', padding: '30px', backgroundColor: '#f3f4f6', minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center'}},
            // Main Card Container (Fully Rounded & Hidden Overflow)
            h('div', {className: "w-full max-w-5xl bg-white rounded-[40px] shadow-2xl overflow-hidden flex flex-col md:flex-row border border-gray-200"},
              
              // LEFT SIDE: Text Content
              h('div', {className: "w-full md:w-1/2 p-10 md:p-14 flex flex-col justify-center bg-white"},
                h('div', {className: "flex items-center gap-4 mb-6"},
                  h('span', {className: "w-12 h-12 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-600 text-2xl"}, "💻"), 
                  h('span', {className: "text-sm font-extrabold uppercase tracking-widest text-indigo-600"}, category)
                ),
                // Text break-words prevents layout breaking
                h('h3', {className: "text-4xl md:text-5xl font-extrabold text-gray-900 leading-tight mb-5 break-words tracking-tight"}, title),
                h('p', {className: "text-base md:text-lg text-gray-500 leading-relaxed mb-8 break-words"}, description),
                h('div', {className: "flex flex-wrap gap-2"}, tagsElements)
              ),

              // RIGHT SIDE: Image Area
              h('div', {className: "w-full md:w-1/2 bg-gray-50 border-l border-gray-100 flex items-center justify-center p-10 relative min-h-[400px]"},
                hasImage 
                  // CMS Native Image Widget perfectly centered
                  ? h('div', {className: "w-full h-full flex items-center justify-center [&_img]:max-h-[350px] [&_img]:w-auto [&_img]:object-contain [&_img]:drop-shadow-2xl [&_img]:transform [&_img]:transition-transform [&_img]:hover:scale-105"}, this.props.widgetFor('image')) 
                  // Fallback if no image uploaded yet
                  : h('div', {className: "flex flex-col items-center justify-center text-gray-400 opacity-60"}, 
                      h('span', {className: "text-6xl mb-4"}, "🖼️"),
                      h('span', {className: "font-semibold text-lg tracking-wide"}, "Upload Image")
                    )
              )
            )
          );
        }
      });

      CMS.registerPreviewTemplate("projects", ProjectPreview);
    </script>
  </body>
</html>
